name: Backend CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: divinegarbh_sanskar
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          path: divine-backend

      - name: Checkout data models
        uses: actions/checkout@v4
        with:
          repository: shingalajaynesh/divine-data-models
          path: divine-data-models
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: divine-backend/package-lock.json

      - name: Configure Git Credentials
        run: git config --global url."https://${{ secrets.GH_PAT || github.token }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies
        run: |
          npm install ../divine-data-models
          npm install
        working-directory: divine-backend

      - name: Run migrations and tests
        env:
          DB_NAME: divinegarbh_sanskar
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_SSL: false
          LOG_LEVEL: info
          FIREBASE_PROJECT_ID: mock
          FIREBASE_CLIENT_EMAIL: mock
          FIREBASE_PRIVATE_KEY: "mock"
          RAZORPAY_KEY_ID: mock
          RAZORPAY_KEY_SECRET: mock
        run: |
          npm run db:migrate
          npm test
        working-directory: divine-backend
