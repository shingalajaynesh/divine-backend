services:
  postgres:
    image: postgres:15-alpine
    container_name: divine_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-divine_garbh_sanskar}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - "5435:5432" # Forward port 5435 on host to 5432 in container (prevents conflict with local HMS/5432)
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .. # Sets build context to the parent workspace directory so it can access divine-data-models
      dockerfile: divine-backend/Dockerfile
    container_name: divine_backend
    restart: always
    ports:
      - "4000:4000" # Expose Apollo GraphQL server on port 4000
    environment:
      - PORT=4000
      - DATABASE_URL=${DATABASE_URL:-}
      - DB_NAME=${DB_NAME:-divine_garbh_sanskar}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?Set DB_PASSWORD in .env}
      - DB_HOST=postgres # Links to the postgres service container name
      - DB_PORT=5432 # Uses internal container port 5432
      - DB_SSL=false # Disables SSL inside local docker networking
      - SLOW_QUERY_THRESHOLD=100
      - LOG_LEVEL=info
      - LOG_FORMAT=dev
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:?Set FIREBASE_PROJECT_ID in .env}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL:-}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY:-}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:8081}
    depends_on:
      - postgres

volumes:
  pgdata:
    driver: local
