services:
  postgres:
    image: postgres:15-alpine
    container_name: divine_postgres
    restart: always
    environment:
      POSTGRES_DB: divinegarbh_sanskar
      POSTGRES_USER: jaynesh
      POSTGRES_PASSWORD: c9NJT9uJTsDok1aUPWMxvb5S4qhfkPRp
    ports:
      - "5435:5432" # Forward port 5435 on host to 5432 in container (prevents conflict with local HMS/5432)
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .. # Sets build context to the parent workspace directory so it can access divine-data-models
      dockerfile: divine-backend/Dockerfile
    container_name: divine_backend
    restart: always
    ports:
      - "4000:4000" # Expose Apollo GraphQL server on port 4000
    environment:
      - PORT=4000
      - DB_NAME=divinegarbh_sanskar
      - DB_USER=jaynesh
      - DB_PASSWORD=c9NJT9uJTsDok1aUPWMxvb5S4qhfkPRp
      - DB_HOST=postgres # Links to the postgres service container name
      - DB_PORT=5432 # Uses internal container port 5432
      - DB_SSL=false # Disables SSL inside local docker networking
      - SLOW_QUERY_THRESHOLD=100
      - LOG_LEVEL=info
      - LOG_FORMAT=dev
      - CLERK_SECRET_KEY=sk_test_BXrZ4BTHITR5lJEHhlFLRRvrmcGUUj2PxkF7DH5k4S
      - CLERK_PUBLISHABLE_KEY=pk_test_a25vd2luZy1sYWJyYWRvci05OC5jbGVyay5hY2NvdW50cy5kZXYk
    depends_on:
      - postgres

volumes:
  pgdata:
    driver: local
